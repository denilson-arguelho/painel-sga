version: '3.8'

services:
  painel-web:
    image: painel-web:latest
    container_name: painel-sga-web
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - painel-network
    labels:
      - "com.example.description=Painel Web SGA"
      - "com.example.version=2.1.0"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  painel-network:
    driver: bridge
